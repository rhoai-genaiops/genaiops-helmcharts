---
apiVersion: trustyai.opendatahub.io/v1alpha1
kind: NemoGuardrails
metadata:
  name: canopy-guardrails
spec:
  nemoConfigs:
    - name: canopy-guardrails
      default: true
      configMaps:
        - canopy-guardrails-config
  env:
    - name: OPENAI_API_KEY
      valueFrom:
        secretKeyRef:
          name: canopy-guardrails-secret
          key: llm-api-key
