{{- if .Values.configMap.enabled }}
{{- $guardrailsNamespace := ternary .Release.Namespace (printf "%s-toolings" (index (splitList "-" .Release.Namespace) 0)) (contains "canopy" .Release.Namespace) -}}
---
kind: ConfigMap
apiVersion: v1
metadata:
  name: ogx-config 
  labels:
    {{- include "llama-stack-operator-instance.labels" . | nindent 4 }}
data:
  config.yaml: |-
    version: '2'
    image_name: vllm
    apis:
    - inference
    {{- if .Values.guardrails.enabled }}
    - safety
    {{- end }}
    - tool_runtime
    {{- if .Values.rag.enabled }}
    - vector_io
    {{- end }}
    - files
    - responses
    providers:
      responses:
      - provider_id: builtin
        provider_type: inline::builtin
        config:
          persistence:
            agent_state:
              namespace: agents
              backend: kv_default
            responses:
              table_name: responses
              backend: sql_default
              max_write_queue_size: 10000
              num_writers: 4
      inference:
      - provider_id: vllm-llama32
        provider_type: "remote::vllm"
        config:
          base_url: "http://llama-32-predictor.ai501.svc.cluster.local:8080/v1"
      - provider_id: sentence-transformers
        provider_type: inline::sentence-transformers
        config: {}
      {{- if .Values.guardrails.enabled }}
      safety:
        - provider_id: nvidia-local-nemo
          provider_type: remote::nvidia
          config:
            guardrails_service_url: "http://canopy-guardrails.{{ $guardrailsNamespace }}.svc.cluster.local"
            config_id: "canopy-guardrails"
      {{- end }}
      files:
      - provider_id: local-files
        provider_type: inline::localfs
        config:
          storage_dir: /opt/app-root/src/data/files
          create_if_missing: true
          metadata_store:
            backend: sql_default
            table_name: files_metadata
      tool_runtime:
      - provider_id: model-context-protocol
        provider_type: remote::model-context-protocol
        config: {}
      - provider_id: brave-search
        provider_type: remote::brave-search
        config:
          api_key: brave-search-api-key
      - provider_id: tavily-search
        provider_type: remote::tavily-search
        config: {}
      {{- if .Values.rag.enabled }}
      - provider_id: rag-runtime
        provider_type: inline::file-search
        config: {}
      vector_io:
      - provider_id: milvus
        provider_type: remote::milvus
        config:
          uri: "http://{{ .Values.rag.milvus.service | default "milvus" }}.{{ .Release.Namespace }}.svc.cluster.local:19530"
          token: "root:Milvus"
          persistence:
            backend: kv_default
            namespace: vector_io::milvus_remote
      {{- end }}
    models:
      - metadata: {}
        model_id: llama32
        provider_id: vllm-llama32
        provider_model_id: llama32
        model_type: llm
      - metadata:
          embedding_dimension: 384
        model_id: all-MiniLM-L6-v2
        provider_id: sentence-transformers
        model_type: embedding
    {{- if .Values.guardrails.enabled }}
    shields:
      - shield_id: nemo-guardrail
        provider_id: nvidia-local-nemo
        provider_resource_id: nemo-model
    {{- end }}
    tool_groups:
    - toolgroup_id: builtin::file_search
      provider_id: rag-runtime
    {{- if .Values.mcp.enabled }}
    - toolgroup_id: mcp::canopy-calendar
      provider_id: model-context-protocol
      mcp_endpoint:
        uri: http://canopy-mcp-calendar-mcp-server:8080/sse
    {{- end }}
    server:
      port: 8321
{{- end }}
