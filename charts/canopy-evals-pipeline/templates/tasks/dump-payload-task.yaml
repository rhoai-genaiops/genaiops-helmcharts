---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: dump-payload
spec:
  params:
    - name: WEBHOOK_PAYLOAD
      type: string
      description: Raw webhook payload JSON
  steps:
    - name: dump-payload
      image: registry.redhat.io/ubi9/ubi-minimal:latest
      script: |
        #!/bin/sh
        echo "========== Raw Webhook Payload =========="
        echo '$(params.WEBHOOK_PAYLOAD)' | python3 -m json.tool 2>/dev/null || echo '$(params.WEBHOOK_PAYLOAD)'
        echo "========================================="
